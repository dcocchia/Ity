name: CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20
          - 22

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck and unit tests with coverage
        run: npm run coverage -- --runInBand

      - name: Build distributables
        run: npm run build

      - name: Test distributable bundle
        run: npm run test:dist -- --runInBand

      - name: Verify npm package contents
        run: npm pack --dry-run
